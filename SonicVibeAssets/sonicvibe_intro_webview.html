
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #01020a;
    }
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            radial-gradient(circle at 28% 38%, rgba(31,229,255,0.16), transparent 44%),
            radial-gradient(circle at 76% 42%, rgba(255,49,206,0.15), transparent 48%);
        pointer-events: none;
        z-index: 1;
    }
    video {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        background: #01020a;
    }
</style>
</head>
